<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halftone 3D Engine - Elite Configurator</title>
    <style>
        :root { --bg: #050510; --accent: #E85002; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        #app { position: absolute; inset: 0; }
        
        .controls { 
            position: fixed; top: 20px; right: 20px; z-index: 100; width: 260px; 
            background: rgba(10, 10, 30, 0.9); backdrop-filter: blur(20px); 
            padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
        }
        .control-group { margin-bottom: 12px; }
        label { display: block; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.6; font-size: 10px; }
        select, input { width: 100%; background: #1a1a3a; color: #fff; border: 1px solid #2a2a50; border-radius: 4px; padding: 6px; }
        
        .header { position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Halftone 3D</h1>
        <p style="opacity: 0.4; font-size: 12px;">WebGL GPU-Accelerated Engine</p>
    </div>

    <!-- Auto-init via data attributes -->
    <div 
        id="app" 
        data-ht-element 
        data-ht-engine="3d" 
        data-ht-source="/sampleimage.png"
        data-ht-grid="80"
        data-ht-contrast="2.5"
    ></div>

    <aside class="controls">
        <div class="control-group">
            <label>Interaction</label>
            <select id="interaction">
                <option value="repulse">Repulse</option>
                <option value="attract">Attract</option>
                <option value="vortex">Vortex</option>
                <option value="ripple">Ripple</option>
                <option value="none">None</option>
            </select>
        </div>
        <div class="control-group">
            <label>Shape</label>
            <select id="shape">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
                <option value="diamond">Diamond</option>
                <option value="triangle">Triangle</option>
            </select>
        </div>
        <div class="control-group">
            <label>Grid Density <span id="grid-val">80</span></label>
            <input type="range" id="grid" min="20" max="250" value="80">
        </div>
        <div class="control-group">
            <label>Cell Gap <span id="gap-val">0</span></label>
            <input type="range" id="gap" min="0" max="10" value="0">
        </div>
        <div class="control-group">
            <label>Dot Scale <span id="dotScale-val">1.0</span></label>
            <input type="range" id="dotScale" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Contrast <span id="contrast-val">2.5</span></label>
            <input type="range" id="contrast" min="1.0" max="5.0" step="0.1" value="2.5">
        </div>
        <div class="control-group">
            <label>Brightness <span id="brightness-val">1.0</span></label>
            <input type="range" id="brightness" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Color</label>
            <input type="color" id="color" value="#E85002">
            <button id="auto-color" style="margin-top:5px; width:100%; font-size:10px; cursor:pointer;">Use Sampled Color</button>
        </div>
    </aside>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import Halftone3D from './index.js';

        // Wait for auto-init
        const waitInit = () => {
            const el = document.getElementById('app');
            if (el.__halftone) {
                const fx = el.__halftone;
                setupUI(fx);
            } else {
                requestAnimationFrame(waitInit);
            }
        };

        const setupUI = (fx) => {
            const sync = (id, val, isRange = true) => {
                if (isRange) document.getElementById(id + '-val').textContent = val;
                fx.updateConfig(id, val);
            };

            document.getElementById('interaction').onchange = (e) => sync('interaction', e.target.value, false);
            document.getElementById('shape').onchange = (e) => sync('shape', e.target.value, false);
            document.getElementById('grid').oninput = (e) => sync('grid', parseInt(e.target.value));
            document.getElementById('gap').oninput = (e) => sync('gap', parseInt(e.target.value));
            document.getElementById('dotScale').oninput = (e) => sync('dotScale', parseFloat(e.target.value));
            document.getElementById('contrast').oninput = (e) => sync('contrast', parseFloat(e.target.value));
            document.getElementById('brightness').oninput = (e) => sync('brightness', parseFloat(e.target.value));
            document.getElementById('color').oninput = (e) => sync('color', e.target.value, false);
            
            document.getElementById('auto-color').onclick = () => sync('color', 'auto', false);
        };

        waitInit();
    </script>
</body>
</html>
