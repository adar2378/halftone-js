<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Halftone Engine - Master Showcase</title>
    <style>
        body { margin: 0; background: #050510; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        .ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }
        .top-left h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; color: #00f2ff; text-transform: uppercase; }
        .top-left p { margin: 5px 0 0; font-size: 14px; opacity: 0.6; }
        
        .controls { position: absolute; top: 30px; right: 30px; z-index: 1000; width: 280px; background: rgba(10, 10, 30, 0.8); backdrop-filter: blur(20px); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: #6a7090; }
        select, input[type="range"] { width: 100%; background: #1a1a3a; color: #fff; border: 1px solid #2a2a50; border-radius: 6px; padding: 8px; cursor: pointer; }
        
        .source-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn { background: #1a1a3a; border: 1px solid #2a2a50; color: #fff; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .btn.active { background: #00f2ff; color: #050510; border-color: #00f2ff; font-weight: 700; }
        
        #ht-canvas-container { position: absolute; inset: 0; z-index: 1; }
        .hint { font-size: 12px; text-align: center; opacity: 0.4; }
        #video-source { display: none; }
        #image-source { display: none; }
    </style>
</head>
<body>

    <div id="ht-canvas-container"></div>

    <div class="ui-overlay">
        <div class="top-left">
            <h1>Gemini Engine</h1>
            <p>Physics-Driven Interactions v2.3.0</p>
        </div>
        <div class="bottom-center hint">
            17 Elite Presets • Dynamic Attributes • Plugin Ready
        </div>
    </div>

    <aside class="controls">
        <div class="control-group">
            <label>Interaction Mode</label>
            <select id="interaction">
                <option value="repulse">Repulse (Push)</option>
                <option value="attract">Attract (Pull)</option>
                <option value="vortex">Vortex (Swirl)</option>
                <option value="magnetic">Magnetic (Face)</option>
                <option value="gravity">Gravity (Fall)</option>
                <option value="drift">Drift (Space)</option>
                <option value="twist">Twist (Spin)</option>
                <option value="float">Float (Bubbles)</option>
                <option value="frenzy">Frenzy (Chaos)</option>
                <option value="warp">Warp (Elastic)</option>
                <option value="bounce">Bounce (Jump)</option>
                <option value="shatter">Shatter (Burst)</option>
                <option value="ripple">Ripple (Wave)</option>
                <option value="swell">Swell (Lens)</option>
                <option value="glitch">Glitch (Cyber)</option>
                <option value="wind">Wind (Blower)</option>
                <option value="pulse">Pulse (Breathe)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Data Source</label>
            <div class="source-grid">
                <button class="btn active" data-source="none">None</button>
                <button class="btn" data-source="image">Image</button>
                <button class="btn" data-source="video">Video</button>
                <button class="btn" data-source="webcam">Webcam</button>
            </div>
        </div>

        <div class="control-group">
            <label>Dot Shape</label>
            <select id="shape">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
                <option value="diamond">Diamond</option>
                <option value="triangle">Triangle</option>
            </select>
        </div>

        <div class="control-group">
            <label>Grid Density <span id="grid-val">14</span></label>
            <input type="range" id="grid" min="6" max="30" value="14">
        </div>

        <div class="control-group">
            <label>Interaction Radius <span id="radius-val">120</span></label>
            <input type="range" id="radius" min="50" max="500" value="120">
        </div>

        <div class="control-group">
            <label>Spring Tension <span id="spring-val">0.10</span></label>
            <input type="range" id="spring" min="0.01" max="0.3" step="0.01" value="0.10">
        </div>

        <div class="control-group">
            <label>Stretch Force <span id="stretch-val">0.20</span></label>
            <input type="range" id="stretch" min="0" max="0.6" step="0.01" value="0.20">
        </div>

        <div class="control-group">
            <label>Main Color</label>
            <input type="color" id="color" value="#00f2ff">
        </div>
    </aside>

    <video id="video-source" loop muted crossorigin="anonymous" src=""></video>
    <img id="image-source" crossOrigin="anonymous" src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&q=80&w=1000">

    <script type="module">
        import Halftone from './index.js';

        setTimeout(() => {
            const container = document.getElementById('ht-canvas-container');
            const fx = new Halftone({ 
                container: container,
                grid: 14,
                color: '#00f2ff'
            });

            const updateLabel = (id, val) => {
                const el = document.getElementById(id + '-val');
                if (el) el.textContent = val;
            };

            document.getElementById('interaction').onchange = (e) => {
                fx.config.interaction = e.target.value;
            };

            document.getElementById('grid').oninput = (e) => {
                const val = parseInt(e.target.value);
                fx.config.grid = val; 
                fx.createGrid(); 
                updateLabel('grid', val);
            };

            document.getElementById('radius').oninput = (e) => {
                const val = parseInt(e.target.value);
                fx.config.radius = val; 
                updateLabel('radius', val);
            };

            document.getElementById('spring').oninput = (e) => {
                const val = parseFloat(e.target.value);
                fx.config.spring = val; 
                updateLabel('spring', val.toFixed(2));
            };

            document.getElementById('stretch').oninput = (e) => {
                const val = parseFloat(e.target.value);
                fx.config.stretch = val; 
                updateLabel('stretch', val.toFixed(2));
            };

            document.getElementById('shape').onchange = (e) => {
                fx.config.shape = e.target.value;
            };

            document.getElementById('color').oninput = (e) => {
                fx.config.color = e.target.value;
            };

            const sourceButtons = document.querySelectorAll('.btn[data-source]');
            sourceButtons.forEach(btn => {
                btn.onclick = async () => {
                    sourceButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const src = btn.dataset.source;
                    if (src === 'none') { fx.config.source = null; fx.sourceReady = false; }
                    else if (src === 'image') { fx.config.source = '#image-source'; }
                    else if (src === 'video') { fx.config.source = '#video-source'; }
                    else if (src === 'webcam') { fx.config.source = 'webcam'; }
                    await fx.loadSource();
                    fx.createGrid();
                };
            });
        }, 0);
    </script>
</body>
</html>
