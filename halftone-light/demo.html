<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HalftoneLight — Interactive Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      min-height: 100vh;
    }
    #canvas-area {
      flex: 1;
      position: relative;
      min-height: 100vh;
    }
    #controls {
      width: 320px;
      background: #111118;
      border-left: 1px solid #222;
      padding: 20px;
      overflow-y: auto;
      max-height: 100vh;
      position: sticky;
      top: 0;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #fff; }
    h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #222;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
      color: #aaa;
    }
    .field label span { color: #666; font-family: monospace; font-size: 11px; }
    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      background: #E85002;
      border-radius: 50%;
      cursor: pointer;
    }
    select, input[type="text"] {
      width: 100%;
      background: #1a1a22;
      border: 1px solid #333;
      color: #ddd;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 4px;
    }
    input[type="color"] {
      width: 40px;
      height: 28px;
      border: 1px solid #333;
      background: none;
      cursor: pointer;
      border-radius: 4px;
      padding: 0;
    }
    .color-row { display: flex; gap: 8px; align-items: center; }
    .color-row label { flex: 1; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    button {
      flex: 1;
      padding: 8px 12px;
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    .source-row { display: flex; gap: 8px; }
    .source-row select { flex: 1; }
    .source-row input { flex: 1; }
    .source-btns { display: flex; gap: 6px; margin-bottom: 8px; }
    .source-btns button { font-size: 11px; padding: 6px 10px; }
    .source-btns button.active { background: #E85002; border-color: #E85002; color: #fff; }
    .upload-label {
      flex: 1;
      padding: 6px 10px;
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .upload-label:hover { background: #333; }
    .upload-label input { display: none; }
  </style>
</head>
<body>
  <div id="canvas-area"></div>

  <div id="controls">
    <h1>HalftoneLight</h1>

    <h2>Source</h2>
    <div class="source-btns">
      <label class="upload-label" title="Upload image or video">
        Upload File
        <input type="file" id="fileUpload" accept="image/*,video/*">
      </label>
      <button id="webcamBtn">Webcam</button>
    </div>
    <div class="field">
      <label>Source URL</label>
      <input type="text" id="source" value="../sampleimage.png" placeholder="image URL or 'webcam'">
    </div>
    <div class="field">
      <label>Fit</label>
      <select id="fit">
        <option value="cover" selected>cover</option>
        <option value="contain">contain</option>
        <option value="fill">fill</option>
      </select>
    </div>

    <h2>Screen (Grid)</h2>
    <div class="field">
      <label>Frequency <span id="val-frequency">40</span></label>
      <input type="range" id="frequency" min="5" max="150" step="1" value="40">
    </div>
    <div class="field">
      <label>Angle <span id="val-angle">0</span></label>
      <input type="range" id="angle" min="0" max="90" step="1" value="0">
    </div>

    <h2>Dot (Shape & Edge)</h2>
    <div class="field">
      <label>Shape</label>
      <select id="shape">
        <option value="circle" selected>circle</option>
        <option value="square">square</option>
        <option value="diamond">diamond</option>
        <option value="line">line</option>
        <option value="cross">cross</option>
        <option value="ellipse">ellipse</option>
      </select>
    </div>
    <div class="field">
      <label>Scale <span id="val-scale">1.0</span></label>
      <input type="range" id="scale" min="0.1" max="2.0" step="0.05" value="1.0">
    </div>
    <div class="field">
      <label>Softness <span id="val-softness">0.5</span></label>
      <input type="range" id="softness" min="0" max="1" step="0.05" value="0.5">
    </div>

    <h2>Tone</h2>
    <div class="field">
      <label>Contrast <span id="val-contrast">1.8</span></label>
      <input type="range" id="contrast" min="0.2" max="5.0" step="0.1" value="1.8">
    </div>
    <div class="field">
      <label>Brightness <span id="val-brightness">1.0</span></label>
      <input type="range" id="brightness" min="0.1" max="3.0" step="0.05" value="1.0">
    </div>
    <div class="field">
      <label>Min Dot <span id="val-minDot">0.0</span></label>
      <input type="range" id="minDot" min="0" max="0.5" step="0.01" value="0.0">
    </div>

    <h2>Color</h2>
    <div class="field">
      <label>Color Mode</label>
      <select id="colorMode">
        <option value="mono" selected>mono</option>
        <option value="auto">auto (source colors)</option>
        <option value="cmyk">cmyk</option>
        <option value="duotone">duotone</option>
      </select>
    </div>
    <div class="color-row field">
      <label>Dot Color</label>
      <input type="color" id="color" value="#E85002">
    </div>
    <div class="color-row field">
      <label>Color B (duotone)</label>
      <input type="color" id="colorB" value="#000000">
    </div>
    <div class="color-row field">
      <label>Background</label>
      <input type="color" id="bgColor" value="#050510">
    </div>

    <h2>Interaction</h2>
    <div class="field">
      <label>Mode</label>
      <select id="interaction">
        <option value="none">none</option>
        <option value="reveal" selected>reveal</option>
        <option value="magnify">magnify</option>
        <option value="warp">warp</option>
        <option value="ripple">ripple</option>
        <option value="vortex">vortex</option>
        <option value="colorShift">colorShift</option>
        <option value="focus">focus</option>
        <option value="comet">comet</option>
        <option value="sparkle">sparkle</option>
      </select>
    </div>
    <div class="field">
      <label>Radius <span id="val-radius">0.3</span></label>
      <input type="range" id="radius" min="0.05" max="0.8" step="0.01" value="0.3">
    </div>
    <div class="field">
      <label>Strength <span id="val-strength">0.5</span></label>
      <input type="range" id="strength" min="0.1" max="2.0" step="0.05" value="0.5">
    </div>
    <div class="field">
      <label>Trail Fade <span id="val-trailFade">0.03</span></label>
      <input type="range" id="trailFade" min="0.01" max="0.10" step="0.005" value="0.03">
    </div>

    <div class="btn-row">
      <button onclick="ht.pause()">Pause</button>
      <button onclick="ht.resume()">Resume</button>
      <button onclick="downloadSnapshot()">Snapshot</button>
    </div>
  </div>

  <script src="dist/halftone-light.min.js"></script>
  <script>
    let ht;

    function init() {
      ht = new HalftoneLight({
        container: '#canvas-area',
        source: document.getElementById('source').value,
        interaction: 'reveal',
      });

      // Wire up controls
      const sliders = ['frequency', 'angle', 'scale', 'softness', 'contrast', 'brightness', 'minDot', 'radius', 'strength', 'trailFade'];
      sliders.forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', () => {
          const v = parseFloat(el.value);
          document.getElementById('val-' + id).textContent = v;
          ht.set(id, v);
        });
      });

      const selects = ['shape', 'colorMode', 'interaction', 'fit'];
      selects.forEach(id => {
        document.getElementById(id).addEventListener('change', (e) => {
          ht.set(id, e.target.value);
        });
      });

      const colors = ['color', 'colorB', 'bgColor'];
      colors.forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
          ht.set(id, e.target.value);
        });
      });

      // Source URL
      let sourceTimeout;
      document.getElementById('source').addEventListener('input', (e) => {
        clearTimeout(sourceTimeout);
        sourceTimeout = setTimeout(() => {
          ht.loadSource(e.target.value).catch(() => {});
        }, 500);
      });

      // File upload (image or video)
      document.getElementById('fileUpload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        document.getElementById('source').value = file.name;
        ht.loadSource(url).catch(() => {});
      });

      // Webcam
      document.getElementById('webcamBtn').addEventListener('click', () => {
        document.getElementById('source').value = 'webcam';
        ht.loadSource('webcam').catch(() => {});
      });
    }

    function downloadSnapshot() {
      const url = ht.snapshot();
      const a = document.createElement('a');
      a.href = url;
      a.download = 'halftone-snapshot.png';
      a.click();
    }

    init();
  </script>
</body>
</html>
